name: End-to-end tests
on:
  push:
    branches:
      - main
  schedule:
   - cron: '0 0 * * *' # nightly build ensure E2E tests run daily and catch any breaking API changes
  pull_request_target:
    types:
      - labeled

jobs:
  integration-test:
    name: 🌍 Integration tests
    # Verify that either the workflow is executed as part of the main-branch or the scheduled test,
    # OR that the PR is labeled using the `run-e2e-test` label and the PR author is a member of the organization.
    if: |
      github.event.action != 'labeled'
      || (github.event.label.name == 'run-e2e-test' && github.event.pull_request.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
    - name: Checkout # nosemgrep
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Set up Go 1.x
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
      with:
        go-version-file: go.mod

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@c4a0df2e75a225d979a444342dd3db752b53619f #v1.13.0

    - name: 🌎 Integration test
      run: gotestsum --format testdox --format-icons hivis -- -v -race -tags=e2e -timeout=30m  ./...
      env:
        CLASSIC_URL: ${{ secrets.CLASSIC_URL }}
        PLATFORM_URL: ${{ secrets.PLATFORM_URL }}
        API_TOKEN: ${{ secrets.API_TOKEN }}
        PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
        OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        OAUTH_TOKEN_ENDPOINT: ${{ secrets.OAUTH_TOKEN_ENDPOINT }}
